name: firebase_uploader_plus
description: >-
  Flutter package for Firebase Storage uploads with Firestore metadata,
  streams, path helpers, file and camera picking, progress callbacks,
  and a customizable upload list widget.
version: 1.1.0
homepage: https://github.com/vipulbansal/firebase_uploader_plus
repository: https://github.com/vipulbansal/firebase_uploader_plus
issue_tracker: https://github.com/vipulbansal/firebase_uploader_plus/issues
documentation: https://github.com/vipulbansal/firebase_uploader_plus#readme

topics:
  - firebase
  - storage
  - firestore
  - upload
  - file-picker

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.7'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core
  firebase_core: ^3.13.1
  firebase_storage: ^12.4.6
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.4
  
  # File & Image Picking
  file_picker: ^10.1.9
  image_picker: ^1.1.2
  
  # UI & Utilities
  path: ^1.9.1
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

funding:
  - https://paypal.me/vipulbansal?country.x=IN&locale.x=en_GB